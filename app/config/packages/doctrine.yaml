doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'

        profiling_collect_backtrace: '%kernel.debug%'
        use_savepoints: true
    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        report_fields_where_declared: true
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: false
        mappings:
            Shared:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Shared/Entity'
                prefix: 'App\Shared\Entity'
                alias: Shared
            Training:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Training/Entity'
                prefix: 'App\Training\Entity'
                alias: Training
            Nutrition:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Nutrition/Entity'
                prefix: 'App\Nutrition\Entity'
                alias: Nutrition
            Wearables:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Wearables/Entity'
                prefix: 'App\Wearables\Entity'
                alias: Wearables
            Analytics:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Analytics/Entity'
                prefix: 'App\Analytics\Entity'
                alias: Analytics
            Ingestion:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Ingestion/Entity'
                prefix: 'App\Ingestion\Entity'
                alias: Ingestion
        controller_resolver:
            auto_mapping: false

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
